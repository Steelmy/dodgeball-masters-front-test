name: Build and Deploy

on:
  push:
    branches:
      - main

# Autorise l'action à écrire sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permet d'annuler les builds en cours si on push deux fois rapidement
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Upload artifact 📦
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Le dossier généré par Vite

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
